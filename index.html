"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"8a3a8eef-4ae6-4bfa-95d9-0c92c2af32b4\"><\u002Fscript>\n<title>DayMind - Your walk shouldn't have a feed.<\u002Ftitle><\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>\n  body { margin: 0; background: #000000; }\n  @keyframes dm-breathe {\n    0%, 100% { transform: scale(1); opacity: 0.95; }\n    50% { transform: scale(1.1); opacity: 0.5; }\n  }\n  .dm-faq-q { transition: opacity 0.15s; }\n  .dm-faq-q:hover { opacity: 0.8; }\n  @media (max-width: 700px) {\n    .m-hide { display: none !important; }\n    .m-pad { padding-left: 22px !important; padding-right: 22px !important; }\n    .m-hero { padding-top: 48px !important; padding-bottom: 56px !important; }\n    .m-grid { grid-template-columns: 1fr !important; }\n    .m-center { text-align: center !important; align-items: center !important; }\n    .m-cta { width: 100% !important; box-sizing: border-box; text-align: center; }\n    .m-footer { flex-direction: column; gap: 20px; align-items: flex-start !important; }\n    .m-proof { flex-direction: column; gap: 12px !important; align-items: center; }\n    .m-proofitem { flex-direction: row !important; align-items: baseline !important; gap: 10px !important; justify-content: center; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;background:#000000;color:#ffffff;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,sans-serif\">\n\n  <!-- NAV -->\n  <div class=\"m-pad\" style=\"max-width:1060px;margin:0 auto;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n    <div style=\"display:flex;align-items:center;gap:11px\">\n      <img src=\"32675310-3126-45ca-9c58-f409ad6a1f22\" alt=\"DayMind\" style=\"width:34px;height:34px;border-radius:8px;border:1px solid rgba(255,255,255,0.18)\">\n \u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PROOF STRIP -->\n  <div class=\"m-pad\" style=\"max-width:1060px;margin:0 auto;padding:0 40px\">\n    <div class=\"m-proof\" style=\"display:flex;justify-content:center;gap:clamp(24px,6vw,72px);padding:28px 0;border-top:1px solid rgba(255,255,255,0.12);border-bottom:1px solid rgba(255,255,255,0.12)\">\n      <div class=\"m-proofitem\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px\"><div style=\"font:600 15px ui-monospace,'SF Mono',Menlo,monospace\">100×<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,0.45)\">daily phone pickups, average<\u002Fdiv><\u002Fdiv>\n      <div class=\"m-proofitem\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px\"><div style=\"font:600 15px ui-monospace,'SF Mono',Menlo,monospace\">0<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,0.45)\">data collected by DayMind<\u002Fdiv><\u002Fdiv>\n      <div class=\"m-proofitem\" style=\"display:flex;flex-direction:column;align-items:center;gap:4px\"><div style=\"font:600 15px ui-monospace,'SF Mono',Menlo,monospace\">$0/mo<\u002Fdiv><div style=\"font-size:13px;color:rgba(255,255,255,0.45)\">after you buy it once<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- THE MOMENT (shield phone + copy) -->\n  <div class=\"m-pad m-grid\" style=\"max-width:1060px;margin:0 auto;padding:96px 40px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center\">\n    <div class=\"m-center\" style=\"display:flex;flex-direction:column;align-items:flex-start;gap:20px\">\n      <div style=\"font:500 12px ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.24em;color:rgba(255,255,255,0.4)\">THE MOMENT THAT MATTERS<\u002Fdiv>\n      <div style=\"font-size:clamp(30px,4.2vw,46px);font-weight:800;letter-spacing:-0.03em;line-height:1.08;text-wrap:balance\">You'll reach for it. That's the point.<\u002Fdiv>\n      <div style=\"font-size:16px;line-height:1.65;color:rgba(255,255,255,0.6);max-width:420px;text-wrap:pretty\">The reach is a reflex. Mid-walk, your thumb finds the app on its own and hits this screen instead. The scroll never starts.<\u002Fdiv>\n      <div style=\"font:500 11px ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.16em;color:rgba(255,255,255,0.4)\">BUILT ON APPLE'S SCREEN TIME<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;justify-content:center\">\n      <div style=\"flex:none;width:300px;border:3px solid rgba(255,255,255,0.22);border-radius:48px;background:#000000;padding:10px\">\n        <div style=\"width:300px;height:649px;overflow:hidden;border-radius:39px;background:radial-gradient(circle at 50% 30%, rgba(255,255,255,0.05), #000000 70%);position:relative;display:flex;flex-direction:column;box-sizing:border-box\">\n          <div style=\"position:absolute;top:9px;left:50%;margin-left:-41px;width:82px;height:24px;border-radius:12px;background:#0a0a0a;border:1px solid rgba(255,255,255,0.09)\"><\u002Fdiv>\n          <div style=\"height:44px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 24px\">\n            <div style=\"font-size:11px;font-weight:600\">9:41<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:4px\">\n              <div style=\"display:flex;align-items:flex-end;gap:1.5px\"><div style=\"width:2px;height:3.5px;background:#ffffff;border-radius:1px\"><\u002Fdiv><div style=\"width:2px;height:5px;background:#ffffff;border-radius:1px\"><\u002Fdiv><div style=\"width:2px;height:6.5px;background:#ffffff;border-radius:1px\"><\u002Fdiv><div style=\"width:2px;height:8px;background:rgba(255,255,255,0.4);border-radius:1px\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;align-items:center\"><div style=\"width:17px;height:9px;box-sizing:border-box;border:1px solid rgba(255,255,255,0.5);border-radius:3px;padding:1.5px\"><div style=\"width:100%;height:100%;background:#ffffff;border-radius:1px\"><\u002Fdiv><\u002Fdiv><div style=\"width:1px;height:3px;background:rgba(255,255,255,0.5);border-radius:0 1px 1px 0;margin-left:1px\"><\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 28px;text-align:center\">\n            <div style=\"display:flex;gap:6px;align-items:flex-start;height:47px\">\n              <div style=\"width:11px;height:37px;background:#ffffff;border-radius:5.5px;animation:dm-breathe 6s ease-in-out infinite\"><\u002Fdiv>\n              <div style=\"width:11px;height:37px;background:#ffffff;border-radius:5.5px;margin-top:10px;animation:dm-breathe 6s ease-in-out infinite;animation-delay:-3s\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:17px;font-weight:700;margin-top:22px\">You're on a walk<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(255,255,255,0.55);margin-top:6px\">This can wait<\u002Fdiv>\n            <div style=\"height:39px;background:#ffffff;border-radius:20px;display:flex;align-items:center;justify-content:center;padding:0 26px;font-size:12px;font-weight:600;color:#000000;margin-top:30px\">Keep walking<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"height:88px;flex:none\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HOW IT WORKS -->\n  <div class=\"m-pad\" style=\"max-width:1060px;margin:0 auto;padding:0 40px 80px\">\n    <div style=\"font:500 12px ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.24em;color:rgba(255,255,255,0.4);margin-bottom:8px\">THREE STEPS, ONCE<\u002Fdiv>\n    <div class=\"m-grid\" style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:0\">\n      <div style=\"display:flex;flex-direction:column;gap:10px;padding:32px 32px 32px 0;border-top:1px solid rgba(255,255,255,0.14)\">\n        <div style=\"font:500 11px ui-monospace,'SF Mono',Menlo,monospace;color:rgba(255,255,255,0.4)\">01<\u002Fdiv>\n        <div style=\"font-size:20px;font-weight:700;letter-spacing:-0.02em\">Pick your poison<\u002Fdiv>\n        <div style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,0.55);text-wrap:pretty\">Choose the apps, sites, or whole categories that eat your attention. Takes 30 seconds.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;padding:32px 32px 32px 0;border-top:1px solid rgba(255,255,255,0.14)\">\n        <div style=\"font:500 11px ui-monospace,'SF Mono',Menlo,monospace;color:rgba(255,255,255,0.4)\">02<\u002Fdiv>\n        <div style=\"font-size:20px;font-weight:700;letter-spacing:-0.02em\">Walk<\u002Fdiv>\n        <div style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,0.55);text-wrap:pretty\">One tap to start, or turn on auto-detect and DayMind notices your feet moving and locks in by itself.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:10px;padding:32px 0;border-top:1px solid rgba(255,255,255,0.14)\">\n        <div style=\"font:500 11px ui-monospace,'SF Mono',Menlo,monospace;color:rgba(255,255,255,0.4)\">03<\u002Fdiv>\n        <div style=\"font-size:20px;font-weight:700;letter-spacing:-0.02em\">That's it<\u002Fdiv>\n        <div style=\"font-size:15px;line-height:1.6;color:rgba(255,255,255,0.55);text-wrap:pretty\">Steps, distance, and streak land on your Lock Screen. Stop walking and everything unpauses.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PAY ONCE -->\n  <div style=\"background:#ffffff;color:#000000\">\n    <div class=\"m-pad\" style=\"max-width:1060px;margin:0 auto;padding:88px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center\">\n      <div style=\"font:500 12px ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.24em;color:rgba(0,0,0,0.45)\">THE PART EVERYONE ASKS ABOUT<\u002Fdiv>\n      <div style=\"font-size:clamp(34px,5.5vw,56px);font-weight:800;letter-spacing:-0.03em;line-height:1.05;text-wrap:balance\">Pay once. Yours forever.<\u002Fdiv>\n      <div style=\"font-size:16px;line-height:1.6;color:rgba(0,0,0,0.6);max-width:440px;text-wrap:pretty\">Focus apps charge $60 to $100 a year to keep you off your own phone. DayMind costs less than one of their months, once, and you own it for life. No trial tricks, no locked features, no premium tier.<\u002Fdiv>\n      <a href=\"#get\" class=\"m-cta\" style=\"font-size:16px;font-weight:600;color:#ffffff;background:#000000;border-radius:29px;padding:17px 36px;text-decoration:none;margin-top:10px;white-space:nowrap\">Download on the App Store<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FAQ -->\n  <div id=\"faq\" class=\"m-pad\" style=\"max-width:760px;margin:0 auto;padding:88px 40px 40px\">\n    <div style=\"font:500 12px ui-monospace,'SF Mono',Menlo,monospace;letter-spacing:0.24em;color:rgba(255,255,255,0.4);margin-bottom:6px\">QUESTIONS, ANSWERED<\u002Fdiv>\n    <sc-for list=\"{{ faqs }}\" as=\"f\" hint-placeholder-count=\"6\">\n      <div style=\"border-top:1px solid rgba(255,255,255,0.14)\">\n        <div class=\"dm-faq-q\" onclick=\"{{ f.toggle }}\" style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;padding:22px 0;cursor:pointer\">\n          <div style=\"font-size:17px;font-weight:600\">{{ f.q }}<\u002Fdiv>\n          <div style=\"font:400 20px ui-monospace,'SF Mono',Menlo,monospace;color:rgba(255,255,255,0.4);flex:none\">{{ f.mark }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ f.open }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:15px;line-height:1.65;color:rgba(255,255,255,0.55);padding:0 40px 24px 0;text-wrap:pretty\">{{ f.a }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n    <div style=\"border-top:1px solid rgba(255,255,255,0.14)\"><\u002Fdiv>\n    <div style=\"font-size:14px;color:rgba(255,255,255,0.45);margin-top:24px\">Something else? <a href=\"support.html\" style=\"color:rgba(255,255,255,0.75)\">Write to support<\u002Fa>.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- FINAL CTA -->\n  <div class=\"m-pad\" style=\"max-width:760px;margin:0 auto;padding:72px 40px 96px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:24px\">\n    <img src=\"32675310-3126-45ca-9c58-f409ad6a1f22\" alt=\"DayMind\" style=\"width:64px;height:64px;border-radius:15px;border:1px solid rgba(255,255,255,0.18)\">\n    <div style=\"font-size:clamp(30px,4.5vw,44px);font-weight:800;letter-spacing:-0.03em;line-height:1.1;text-wrap:balance\">Be where your feet are.<\u002Fdiv>\n    <a href=\"#get\" class=\"m-cta\" style=\"font-size:17px;font-weight:600;color:#000000;background:#ffffff;border-radius:30px;padding:18px 40px;text-decoration:none;white-space:nowrap\">Download on the App Store<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div class=\"m-pad m-footer\" style=\"max-width:1060px;margin:0 auto;padding:36px 40px 52px;display:flex;align-items:center;justify-content:space-between;gap:16px;border-top:1px solid rgba(255,255,255,0.12)\">\n    <div style=\"display:flex;align-items:center;gap:9px\">\n      <img src=\"32675310-3126-45ca-9c58-f409ad6a1f22\" alt=\"\" style=\"width:22px;height:22px;border-radius:5px;border:1px solid rgba(255,255,255,0.15)\">\n      <div style=\"font-size:13px;font-weight:600;color:rgba(255,255,255,0.6)\">DayMind<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:24px;flex-wrap:wrap\">\n      <a href=\"support.html\" style=\"font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none\">Support<\u002Fa>\n      <a href=\"privacy.html\" style=\"font-size:13px;color:rgba(255,255,255,0.5);text-decoration:none\">Privacy<\u002Fa>\n      <div style=\"font-size:13px;color:rgba(255,255,255,0.3)\">© 2026 DayMind<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { openIdx: -1 };\n\n  faqData = [\n    { q: \"Can I still use my phone on a walk?\", a: \"Yes. Calls, texts, maps, music, camera: everything works except the apps you chose to block. And even those aren't hard-locked: the block screen is friction, not a cage. You can dismiss it if you truly need to, and Emergency Unblock lifts everything in one tap.\" },\n    { q: \"Does it really start by itself?\", a: \"Turn on auto-detect and DayMind notices when your feet start moving and begins the walk on its own. No tap, no thinking. It ends the same way when you stop. You can always start and end walks manually too.\" },\n    { q: \"What does it track?\", a: \"Steps, distance, and time, straight from your iPhone's pedometer, plus your day streak. No GPS route, no map, no heart rate. It's a focus app that counts your walk, not a fitness platform.\" },\n    { q: \"What about my data?\", a: \"There is none. No account, no cloud, no analytics, no ads. Everything stays on your device, and Apple's Screen Time design means not even DayMind can see which apps you picked.\" },\n    { q: \"Is it really not a subscription?\", a: \"Really. One price, every feature, forever. We think an app that helps you use your phone less shouldn't bill you monthly for the privilege.\" },\n    { q: \"What does it need to run?\", a: \"An iPhone on iOS 17 or later, plus Screen Time permission (to pause apps) and Motion permission (to count steps). Both are handled by iOS on your device.\" }\n  ];\n\n  renderVals() {\n    const openIdx = this.state.openIdx;\n    return {\n      faqs: this.faqData.map((f, i) => ({\n        q: f.q,\n        a: f.a,\n        open: openIdx === i,\n        mark: openIdx === i ? \"−\" : \"+\",\n        toggle: () => this.setState({ openIdx: openIdx === i ? -1 : i })\n      }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
